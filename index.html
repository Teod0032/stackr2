<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progressive Overload App</title>
    <style>
        :root {
            --background: #0F1333;
            --cardBgLeft: #E6E6E6;
            --cardBgRight: #D1D1D1;
            --accent: #F28C42;
            --textDark: #111534;
            --textLight: #FFFFFF;
            --inputBg: #2A2E4D;
            --danger: #FF4444;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--background);
            color: var(--textLight);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Layout */
        #app { display: flex; flex-direction: column; height: 100%; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; }
        .scroll-area { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        
        /* Card Styles */
        .card { 
            position: relative; width: 100%; height: 90px; margin-bottom: 35px;
            display: flex; border-radius: 20px; overflow: hidden;
        }
        .card-left { flex: 0.55; background: var(--cardBgLeft); clip-path: polygon(0 0, 100% 0, 85% 100%, 0 100%); display: flex; align-items: center; padding-left: 20px; color: var(--textDark); font-weight: bold; }
        .card-right { flex: 0.45; background: var(--cardBgRight); clip-path: polygon(15% 0, 100% 0, 100% 100%, 0 100%); display: flex; align-items: center; justify-content: center; color: var(--textDark); cursor: pointer; }
        
        .badge { 
            position: absolute; top: -10px; right: 5px; width: 50px; height: 50px; 
            border-radius: 50%; border: 4px solid var(--background);
            display: flex; align-items: center; justify-content: center; font-weight: bold;
        }

        /* Controls */
        button { border: none; cursor: pointer; border-radius: 20px; padding: 10px 20px; font-weight: bold; }
        .fab { position: fixed; bottom: 30px; width: 60px; height: 60px; border-radius: 30px; font-size: 24px; color: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .fab-right { right: 30px; }
        .fab-left { left: 30px; }

        /* Modal */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: flex-end; }
        .modal-content { background: var(--background); width: 100%; padding: 30px; border-radius: 30px 30px 0 0; }
        input { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--inputBg); color: white; margin-bottom: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="app">
    <div class="header">
        <button id="prevBtn" onclick="changeWorkout(-1)">◀</button>
        <h2 id="workoutTitle">Workout</h2>
        <button id="nextBtn" onclick="changeWorkout(1)">▶</button>
    </div>
    <div id="workoutList" class="scroll-area"></div>
    <button class="fab fab-left" id="checkBtn" onclick="markComplete()">✓</button>
    <button class="fab fab-right" onclick="openModal()">+</button>
</div>

<dialog id="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Add Exercise</h3>
        <input type="text" id="exName" placeholder="Exercise Name">
        <input type="number" id="exWeight" placeholder="Weight (kg)">
        <input type="number" id="exReps" placeholder="Reps">
        <div style="display: flex; gap: 10px;">
            <button onclick="closeModal()">Cancel</button>
            <button id="saveBtn" onclick="saveExercise()" style="flex:1; background: var(--accent);">Save</button>
        </div>
    </div>
</dialog>

<script>
    // --- State ---
    let workouts = JSON.parse(localStorage.getItem('@stackr_workouts_v1')) || [
        { id: 'w1', title: "Push Day", color: '#F28C42', exercises: [] },
        { id: 'w2', title: "Pull Day", color: '#42D4F2', exercises: [] }
    ];
    let currentIndex = 0;

    // --- Logic ---
    function render() {
        const active = workouts[currentIndex];
        document.getElementById('workoutTitle').innerText = active.title;
        document.body.style.backgroundColor = active.color;
        
        const list = document.getElementById('workoutList');
        list.innerHTML = '';
        active.exercises.forEach(ex => {
            const el = document.createElement('div');
            el.className = 'card';
            el.innerHTML = `
                <div class="card-left">${ex.name}</div>
                <div class="card-right" onclick="increment(${ex.id})">${ex.weight} kg</div>
                <div class="badge" style="background:${active.color}">${ex.reps}</div>
            `;
            list.appendChild(el);
        });
        localStorage.setItem('@stackr_workouts_v1', JSON.stringify(workouts));
    }

    function changeWorkout(dir) {
        currentIndex = Math.max(0, Math.min(workouts.length - 1, currentIndex + dir));
        render();
    }

    function openModal() { document.getElementById('modal').showModal(); }
    function closeModal() { document.getElementById('modal').close(); }

    function saveExercise() {
        const name = document.getElementById('exName').value;
        const weight = document.getElementById('exWeight').value;
        const reps = document.getElementById('exReps').value;
        
        if (name) {
            workouts[currentIndex].exercises.push({ id: Date.now(), name, weight, reps });
            render();
            closeModal();
        }
    }

    function increment(id) {
        const ex = workouts[currentIndex].exercises.find(e => e.id === id);
        if (ex) {
            ex.weight = parseInt(ex.weight) + 2.5;
            render();
        }
    }

    function markComplete() {
        alert("Workout Logged!");
        // Add logic for recovery dates here
    }

    // Initialize
    render();
</script>
</body>
</html>
